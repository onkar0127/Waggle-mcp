apiVersion: v1
kind: ConfigMap
metadata:
  name: graph-memory-config
data:
  GRAPH_MEMORY_BACKEND: "neo4j"
  GRAPH_MEMORY_TRANSPORT: "http"
  GRAPH_MEMORY_HTTP_HOST: "0.0.0.0"
  GRAPH_MEMORY_HTTP_PORT: "8080"
  GRAPH_MEMORY_DEFAULT_TENANT_ID: "workspace-default"
  GRAPH_MEMORY_LOG_LEVEL: "INFO"
  GRAPH_MEMORY_RATE_LIMIT_RPM: "120"
  GRAPH_MEMORY_WRITE_RATE_LIMIT_RPM: "60"
  GRAPH_MEMORY_MAX_CONCURRENT_REQUESTS: "8"
  GRAPH_MEMORY_MAX_PAYLOAD_BYTES: "1048576"
  GRAPH_MEMORY_REQUEST_TIMEOUT_SECONDS: "30"
  GRAPH_MEMORY_MODEL: "all-MiniLM-L6-v2"
  GRAPH_MEMORY_NEO4J_URI: "bolt://neo4j:7687"
  GRAPH_MEMORY_NEO4J_DATABASE: "neo4j"
